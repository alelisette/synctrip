{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SyncTrip{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body>
    <div class="navbar">
        <div class="brand">
            <a href="{% url 'core:home' %}">SyncTrip</a>
        </div>
        <div>
        {% if usuario_actual %}
            Hola, {{ usuario_actual.nombre }} |
            <a href="{% url 'core:lista_viajes' %}">Viajes</a>
            <a href="{% url 'core:crear_viaje' %}">Crear viaje</a>
            <a href="{% url 'core:perfil' %}">Mi perfil</a>
            <a href="{% url 'core:logout' %}">Cerrar sesión</a>
        {% else %}

                <a href="{% url 'core:login' %}">Iniciar sesión</a>
                <a href="{% url 'core:registro' %}">Registrarse</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
