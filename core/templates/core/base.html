{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <link rel="icon" href="{% static 'core/img/favicon.ico' %}">
    <meta charset="UTF-8">
    <title>{% block title %}SyncTrip{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body>
    <div class="navbar">
    <div class="brand">
    <a href="{% url 'core:home' %}">SyncTrip</a>
    </div>

    <nav class="nav-links">
        {% if usuario_actual %}
            <a href="{% url 'core:lista_viajes' %}">Viajes</a>
            <a href="{% url 'core:crear_viaje' %}">Crear viaje</a>
            <a href="{% url 'core:perfil' %}">Mi perfil</a>
            <a href="{% url 'core:logout' %}" class="nav-logout">Cerrar sesión</a>
        {% else %}
            <a href="{% url 'core:login' %}">Iniciar sesión</a>
            <a href="{% url 'core:registro' %}" class="nav-primary">Registrarse</a>
        {% endif %}
    </nav>
</div>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
